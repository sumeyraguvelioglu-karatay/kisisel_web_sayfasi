<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="0.55" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#fef9c3"/>
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#g)"/>

  <!-- soft blobs -->
  <circle cx="260" cy="160" r="170" fill="#2563eb" opacity="0.20" filter="url(#blur)"/>
  <circle cx="1380" cy="170" r="220" fill="#f59e0b" opacity="0.18" filter="url(#blur)"/>
  <circle cx="820" cy="520" r="260" fill="#10b981" opacity="0.14" filter="url(#blur)"/>

  <!-- waves -->
  <path d="M0,420 C240,360 420,520 700,450 C980,380 1180,520 1600,430 L1600,600 L0,600 Z"
        fill="#ffffff" opacity="0.35"/>
  <path d="M0,460 C260,400 460,560 720,490 C1020,410 1200,560 1600,470 L1600,600 L0,600 Z"
        fill="#ffffff" opacity="0.22"/>
</svg>